version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:///./cssbuddy.db
      SECRET_KEY: dev_secret_key_change_in_prod
      FRONTEND_URL: http://localhost:5173
      CORS_ORIGINS: http://localhost:5173
      ADMIN_EMAIL: cssbuddy.pk@gmail.com
    volumes:
      - ./backend:/app
      - backend_data:/app/data
      - backend_essays:/app/essays
    working_dir: /app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  backend_data:
  backend_essays:
